<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Медико-педагого-психологические тесты Яшара Ибадова</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Settings page -->
    <div id="settings"></div>

    <!-- Coloring page -->
    <div id="coloring" style="display:none;"></div>

    <!-- Global modal backdrop -->
    <div id="modal-backdrop" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
        <div id="modal-box" class="bg-white rounded-xl shadow-xl p-6 max-w-sm w-full mx-4">
            <p id="modal-text" class="text-gray-800 text-base mb-6"></p>
            <div class="flex gap-3 justify-end">
                <button id="modal-cancel" class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 transition">Отмена</button>
                <button id="modal-confirm" class="px-4 py-2 rounded-lg bg-red-500 text-white hover:bg-red-600 transition">Подтвердить</button>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script src="js/statistics.js"></script>
    <script src="js/api.js"></script>
    <script src="js/canvas.js"></script>

    <script>
        async function loadComponent(id, file) {
            try {
                const response = await fetch(file);
                if (!response.ok) throw new Error('Failed to load ' + file);
                const content = await response.text();
                document.getElementById(id).innerHTML = content;
            } catch (e) {
                console.error('Error loading component:', e);
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadComponent('settings', 'settings.html');
            await loadComponent('coloring', 'coloring.html');
            App.init();
        });
    </script>
</body>
</html>

<div id="coloring-page">

    <!-- ═══ TOOLBAR ═══════════════════════════════════════════════ -->
    <div id="toolbar" class="px-3 py-2 flex items-center gap-2 flex-wrap">

        <!-- Home -->
        <button id="homeBtn" class="tool-btn text-red-500 border-red-200 hover:bg-red-50" title="На главную">
            <i class="fas fa-home"></i>
            <span class="hidden sm:inline">Главная</span>
        </button>

        <div class="w-px h-7 bg-gray-200 flex-shrink-0"></div>

        <!-- Color palette -->
        <div class="flex items-center gap-1 flex-wrap" id="color-palette" title="Выбор цвета"></div>

        <div class="w-px h-7 bg-gray-200 flex-shrink-0"></div>

        <!-- Brush sizes -->
        <div class="flex items-center gap-2 flex-shrink-0" id="brush-sizes" title="Размер кисти"></div>

        <div class="w-px h-7 bg-gray-200 flex-shrink-0"></div>

        <!-- Rotation -->
        <div class="flex items-center gap-1 flex-shrink-0">
            <button id="rotateLeftBtn" class="tool-btn" title="Повернуть влево 90°">
                <i class="fas fa-undo"></i>
            </button>
            <span id="rotationAngle" class="text-xs text-gray-500 w-8 text-center">0°</span>
            <button id="rotateRightBtn" class="tool-btn" title="Повернуть вправо 90°">
                <i class="fas fa-redo"></i>
            </button>
        </div>

        <div class="w-px h-7 bg-gray-200 flex-shrink-0"></div>

        <!-- Zoom -->
        <div class="flex items-center gap-1 flex-shrink-0">
            <button id="zoomOutBtn" class="tool-btn" title="Уменьшить">
                <i class="fas fa-search-minus"></i>
            </button>
            <span id="zoomLevel" class="text-xs text-gray-500 w-10 text-center">100%</span>
            <button id="zoomInBtn" class="tool-btn" title="Увеличить">
                <i class="fas fa-search-plus"></i>
            </button>
        </div>

        <div class="w-px h-7 bg-gray-200 flex-shrink-0"></div>

        <!-- Undo / Redo -->
        <div class="flex items-center gap-1 flex-shrink-0">
            <button id="undoBtn" class="tool-btn opacity-50 cursor-not-allowed" title="Отменить (Ctrl+Z)" disabled>
                <i class="fas fa-reply"></i>
            </button>
            <button id="redoBtn" class="tool-btn opacity-50 cursor-not-allowed" title="Повторить (Ctrl+Y)" disabled>
                <i class="fas fa-share"></i>
            </button>
        </div>

        <div class="w-px h-7 bg-gray-200 flex-shrink-0"></div>

        <!-- Pan mode -->
        <button id="panModeBtn" class="tool-btn" title="Режим перемещения">
            <i class="fas fa-hand-paper"></i>
            <span class="hidden sm:inline">Перемещение</span>
        </button>

        <!-- Center -->
        <button id="centerBtn" class="tool-btn" title="Центрировать">
            <i class="fas fa-compress-alt"></i>
            <span class="hidden sm:inline">Центр</span>
        </button>

        <div class="w-px h-7 bg-gray-200 flex-shrink-0 ml-auto"></div>

        <!-- Calculate -->
        <button id="calculateBtn" class="tool-btn bg-green-500 text-white border-green-500 hover:bg-green-600" title="Рассчитать">
            <i class="fas fa-chart-bar"></i>
            <span class="hidden sm:inline">Рассчитать</span>
        </button>

        <!-- Clear -->
        <button id="clearBtn" class="tool-btn text-orange-500 border-orange-200 hover:bg-orange-50" title="Очистить раскраску">
            <i class="fas fa-eraser"></i>
            <span class="hidden sm:inline">Очистить</span>
        </button>

    </div>

    <!-- ═══ WORK AREA ═══════════════════════════════════════════════ -->
    <div id="work-area">

        <!-- Canvas wrapper -->
        <div id="canvas-wrapper">
            <div id="canvas-container">
                <canvas id="main-canvas"></canvas>

                <!-- Loading overlay -->
                <div id="loading-overlay" style="display:none;"
                    class="absolute inset-0 bg-white bg-opacity-75 flex flex-col items-center justify-center z-10">
                    <i class="fas fa-spinner fa-spin text-blue-400 text-3xl mb-3"></i>
                    <span id="loading-text" class="text-gray-600 text-sm">Загрузка...</span>
                </div>
            </div>
        </div>

        <!-- Results panel (hidden until calculate) -->
        <div id="results-panel" style="display:none;" class="flex-col">
            <div class="px-4 py-3 border-b border-gray-100 bg-gray-50 flex items-center justify-between flex-shrink-0">
                <h2 class="font-semibold text-gray-800 text-sm flex items-center gap-2">
                    <i class="fas fa-chart-pie text-blue-400"></i>
                    Результаты анализа
                </h2>
                <button onclick="App.hideResults()" class="text-gray-400 hover:text-gray-600 transition" title="Скрыть">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="results-scroll" class="flex-1 overflow-y-auto p-4"></div>
        </div>

    </div><!-- /#work-area -->

</div><!-- /#coloring-page -->

<script>
    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (!document.getElementById('coloring-page') ||
            document.getElementById('coloring').style.display === 'none') return;

        if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
            e.preventDefault();
            App.undo();
        }
        if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
            e.preventDefault();
            App.redo();
        }
    });
</script>
